<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Cricket ball</title>
  <desc id="desc">Illustration of a stitched cricket ball on a turf background.</desc>
